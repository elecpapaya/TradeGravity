name: Quality checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check browser JavaScript
        run: node --check site/app.js && node --check site/security.js

      - name: Test browser security helpers
        run: node --test site/security.test.cjs

      - name: Scan Go dependencies
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
