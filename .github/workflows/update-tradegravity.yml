name: Update TradeGravity

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tradegravity
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"

      - name: Run quality checks
        run: |
          go test ./...
          go vet ./...

      - name: Run collector
        env:
          WITS_BASE_URL: https://wits.worldbank.org/API/V1/
        run: go run ./cmd/collector run -provider wits -db tradegravity.db

      - name: Run publisher
        run: go run ./cmd/publisher build -db tradegravity.db -out site/data

      - name: Validate published dataset
        run: go run ./cmd/validator -dir site/data -min-reporters 40

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
