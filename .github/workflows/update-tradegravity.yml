name: Update TradeGravity core

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tradegravity-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"

      - name: Run quality checks
        run: |
          go test ./...
          go vet ./...

      - name: Build country context
        run: go run ./cmd/context -out site/data/context.json

      - name: Collect headline history
        env:
          WITS_BASE_URL: https://wits.worldbank.org/API/V1/
        run: go run ./cmd/collector run -provider wits -history-years 9 -db tradegravity.db

      - name: Collect HS2 product chapters
        env:
          COMTRADE_RATE_LIMIT_PER_SEC: "1"
          COMTRADE_MAX_RETRIES: "6"
          COMTRADE_TIMEOUT_SECONDS: "60"
        run: go run ./cmd/collector products -provider comtrade -primary-provider wits -year auto -product-level 2 -concurrency 2 -db tradegravity.db

      - name: Collect multi-partner bilateral matrix
        env:
          COMTRADE_RATE_LIMIT_PER_SEC: "1"
          COMTRADE_MAX_RETRIES: "6"
          COMTRADE_TIMEOUT_SECONDS: "60"
        run: go run ./cmd/collector matrix -provider comtrade -primary-provider wits -year auto -concurrency 2 -db tradegravity.db

      - name: Collect curated strategic HS6 tariffs
        env:
          TRAINS_TIMEOUT_SECONDS: "60"
          TRAINS_RETRIES: "2"
          TRAINS_BACKOFF_MILLISECONDS: "1000"
        run: go run ./cmd/collector tariffs -provider trains -year auto -registry configs/strategic_hs6.csv -partners WLD -data-type aveestimated -concurrency 3 -db tradegravity.db

      - name: Run publisher
        run: go run ./cmd/publisher build -db tradegravity.db -out site/data -context site/data/context.json -series-years 10 -product-provider comtrade -product-level 2

      - name: Build evidence-grounded explanations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.6-luna
        shell: bash
        run: |
          args=()
          if [[ -n "$OPENAI_API_KEY" ]]; then args+=("-ai"); fi
          go run ./cmd/explainer -dir site/data -max-ai-reporters 10 "${args[@]}"

      - name: Validate published dataset
        run: go run ./cmd/validator -dir site/data -min-reporters 40

      - name: Save core state for the semiconductor refresh
        uses: actions/upload-artifact@v4
        with:
          name: tradegravity-core
          path: |
            tradegravity.db
            site/data/context.json
          if-no-files-found: error
          retention-days: 3
