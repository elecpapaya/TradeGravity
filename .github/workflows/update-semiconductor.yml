name: Update TradeGravity semiconductor

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: tradegravity-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"

      - name: Run quality checks
        run: |
          go test ./...
          go vet ./...

      - name: Find the latest successful core refresh
        id: core
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          response="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/update-tradegravity.yml/runs?status=success&per_page=1")"
          run_id="$(jq -r '.workflow_runs[0].id // empty' <<<"$response")"
          updated_at="$(jq -r '.workflow_runs[0].updated_at // empty' <<<"$response")"
          if [[ -z "$run_id" || -z "$updated_at" ]]; then
            echo "No successful core refresh is available." >&2
            exit 1
          fi

          completed_at="$(date -d "$updated_at" +%s)"
          ready_at=$((completed_at + 35 * 60))
          now="$(date +%s)"
          wait_seconds=$((ready_at > now ? ready_at - now : 0))
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "wait_seconds=$wait_seconds" >> "$GITHUB_OUTPUT"
          echo "Using core run $run_id, completed at $updated_at; quota wait: ${wait_seconds}s."

      - name: Download the core refresh state
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.core.outputs.run_id }}
        run: gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name tradegravity-core --dir .

      - name: Verify the core refresh state
        shell: bash
        run: |
          test -s tradegravity.db
          test -s site/data/context.json

      - name: Wait for the public Comtrade quota window
        if: steps.core.outputs.wait_seconds != '0'
        env:
          WAIT_SECONDS: ${{ steps.core.outputs.wait_seconds }}
        run: sleep "$WAIT_SECONDS"

      - name: Collect curated strategic HS6 products
        env:
          COMTRADE_RATE_LIMIT_PER_SEC: "1"
          COMTRADE_MAX_RETRIES: "6"
          COMTRADE_TIMEOUT_SECONDS: "60"
        run: go run ./cmd/collector strategic -provider comtrade -primary-provider wits -year auto -history-years 4 -registry configs/strategic_hs6.csv -allowlist configs/chip_connectors.csv -concurrency 2 -db tradegravity.db

      - name: Collect focused monthly semiconductor signals
        env:
          COMTRADE_FREQUENCY: M
          COMTRADE_RATE_LIMIT_PER_SEC: "1"
          COMTRADE_MAX_RETRIES: "6"
          COMTRADE_TIMEOUT_SECONDS: "60"
        run: go run ./cmd/collector chip-monthly -provider comtrade -months 12 -reference configs/semiconductor_reference.json -allowlist configs/chip_connectors.csv -concurrency 2 -db tradegravity.db

      - name: Run publisher
        run: go run ./cmd/publisher build -db tradegravity.db -out site/data -context site/data/context.json -series-years 10 -product-provider comtrade -product-level 2

      - name: Build evidence-grounded explanations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.6-luna
        shell: bash
        run: |
          args=()
          if [[ -n "$OPENAI_API_KEY" ]]; then args+=("-ai"); fi
          go run ./cmd/explainer -dir site/data -max-ai-reporters 10 "${args[@]}"

      - name: Validate published dataset
        run: go run ./cmd/validator -dir site/data -min-reporters 40

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
