name: Deploy TradeGravity site

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: tradegravity-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check out latest published dataset
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: .published-site
          persist-credentials: false

      - name: Reuse latest validated dataset
        shell: bash
        run: |
          test -s .published-site/data/latest.json
          test -s .published-site/data/meta.json
          rm -rf site/data
          cp -a .published-site/data site/data
          mkdir -p site/data/semiconductors
          if test -s site/data/semiconductors/reference.json; then
            jq --slurp '.[0] + {generated_at: .[1].generated_at, publication: .[1].publication}' \
              configs/semiconductor_reference.json site/data/semiconductors/reference.json \
              > site/data/semiconductors/reference.tmp.json
            mv site/data/semiconductors/reference.tmp.json site/data/semiconductors/reference.json
          else
            cp configs/semiconductor_reference.json site/data/semiconductors/reference.json
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
